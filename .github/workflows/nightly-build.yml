name: 🌙 Nightly Build

on:
  schedule:
    - cron: '0 0 * * *'  # كل يوم منتصف الليل
  workflow_dispatch:

jobs:
  nightly:
    name: 🌙 Nightly APK Build
    runs-on: ubuntu-latest
    
    steps:
      - name: 📥 Checkout
        uses: actions/checkout@v4
      
      - name: ☕ Setup JDK
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'
      
      - name: 🤖 Setup Android SDK
        uses: android-actions/setup-android@v3
      
      - name: 🔓 Grant permission
        run: chmod +x gradlew
      
      - name: 🏗️ Build Debug APK
        run: ./gradlew assembleDebug
      
      - name: 📊 Get build stats
        id: stats
        run: |
          echo "date=$(date +'%Y-%m-%d')" >> $GITHUB_OUTPUT
          echo "size=$(ls -lh app/build/outputs/apk/debug/*.apk | awk '{print $5}')" >> $GITHUB_OUTPUT
      
      - name: 📤 Upload Nightly Build
        uses: actions/upload-artifact@v4
        with:
          name: ParentLink-Nightly-${{ steps.stats.outputs.date }}
          path: app/build/outputs/apk/debug/*.apk
          retention-days: 7
      
      - name: 📨 Send nightly report
        uses: appleboy/telegram-action@master
        with:
          to: ${{ secrets.TELEGRAM_TO }}
          token: ${{ secrets.TELEGRAM_TOKEN }}
          message: |
            🌙 بناء ليلي لـ ParentLink
            📅 التاريخ: ${{ steps.stats.outputs.date }}
            📦 الحجم: ${{ steps.stats.outputs.size }}
            ✅ الحالة: ناجح