# .github/workflows/fix-build.yml
name: Fix APK Build

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup JDK
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Fix gradlew permissions
        run: chmod +x gradlew

      - name: Clean project
        run: ./gradlew clean

      - name: Build APK with debug info
        run: |
          ./gradlew assembleDebug --stacktrace --info
          
      - name: List all files to find APK
        run: |
          echo "=== البحث عن أي ملف APK ==="
          find . -name "*.apk" 2>/dev/null || echo "لا يوجد APK"
          echo "=== هيكل مجلد outputs ==="
          ls -la app/build/outputs/ || echo "مجلد outputs غير موجود"
          ls -la app/build/outputs/apk/ || echo "مجلد apk غير موجود"
          ls -la app/build/outputs/apk/debug/ || echo "مجلد debug غير موجود"

      - name: Upload anything found
        uses: actions/upload-artifact@v4
        with:
          name: any-apk-found
          path: "**/*.apk"